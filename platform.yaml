languages:
  cpp:
    name: C++
    iconPath: /plugins/cpp.svg
    monacoLanguageId: cpp
    ephemeralFileName: main.cpp
    monacoFile: /workspace/main.cpp
    extensions: [.cpp]
    playgroundInitialCode: |
      #include <iostream>

      int main() {
        std::cout << "Hello, SupremeCode, from C++";
      }
    testerConfig:
      imageName: supremecode-cpp-test
      testPath: /sc_test.сс
      solutionPath: /solution.hpp
      reportPath: /usr/app/build/junit.xml
      verdictClassName: org.supremecode.commonplugins.GtestCppLanguageTester
    runnerConfig:
      image: supremecode-cpp-run
      cmd: ["g++", "-std=c++17", "-o", "app", "main.cpp", "&&", "./app"]
      filePath: main.cpp
    lspConfig:
      image: supremecode-cpp-lsp
  java:
    name: Java
    iconPath: /plugins/java.svg
    monacoLanguageId: java
    extensions: [.java]
    ephemeralFileName: Main.java
    monacoFile: /workspace/Main.java
    playgroundInitialCode: |
      class App {
        public static void main(String... args) throws Exception {
          for(int i = 0; i < 100; ++i) {
              System.out.println("Hello, SupremeCode, from Java " + i);
              if(i % 5 == 0) {
                Thread.sleep(1000);
              }
          }
        }
      }
    testerConfig:
      imageName: supremecode-java-test
      testPath: /src/test/java/JunitTest.java
      solutionPath: /src/main/java/org/example/Solution.java
      reportPath: /usr/app/target/surefire-reports/TEST-JunitTest.xml
      verdictClassName: org.supremecode.commonplugins.PyTestLanguageTester
    runnerConfig:
      image: supremecode-java-run
      filePath: Main.java
    lspConfig:
      image: supremecode-java-lsp
  javascript:
    name: JavaScript
    iconPath: /plugins/javascript.svg
    monacoLanguageId: javascript
    extensions: [.js,.jsx]
    monacoFile: /workspace/index.js
    ephemeralFileName: index.js
    playgroundInitialCode: 'console.log("Hello, SupremeCode, from JavaScript")'
    testerConfig:
      imageName: supremecode-js-test
      cmd: ["npm", "run", "test"]
      testPath: /test.js
      solutionPath: /solution.js
      reportPath: /usr/app/junit.xml
      verdictClassName: org.supremecode.commonplugins.JestLanguageTester
    runnerConfig:
      image: supremecode-js-run
      filePath: index.js
    lspConfig:
      image: supremecode-ts-lsp
  typescript:
    name: TypeScript
    iconPath: /plugins/typescript.svg
    monacoLanguageId: typescript
    monacoFile: /workspace/index.ts
    extensions: [.js,.jsx,.ts,.tsx]
    ephemeralFileName: index.ts
    playgroundInitialCode: 'console.log("Hello, SupremeCode, from TypeScript")'
    testerConfig:
      imageName: supremecode-js-test
      testPath: /test.js
      solutionPath: /solution.js
      reportPath: /usr/app/junit.xml
      verdictClassName: org.supremecode.commonplugins.JestLanguageTester
    lspConfig:
      image: supremecode-ts-lsp
      cmd: ["deno", "lsp"]
  python:
    name: Python
    iconPath: /plugins/python.svg
    monacoLanguageId: python
    monacoFile: /workspace/main.py
    extensions: [ .py ]
    ephemeralFileName: main.py
    playgroundInitialCode: 'print("Hello world")'
    testerConfig:
      imageName: supremecode-python
      cmd: ["pytest", "--junitxml=report.xml"]
      testPath: /test_solution.py
      solutionPath: /solution.py
      reportPath: /usr/app/report.xml
      verdictClassName: org.supremecode.commonplugins.PyTestLanguageTester
    runnerConfig:
      image: supremecode-python
      cmd: ["python", "main.py"]
      filePath: main.py
    lspConfig:
      image: supremecode-python-lsp
      cmd: ["pyright-langserver", "--stdio"]
  golang:
    name: Golang
    iconPath: /plugins/golang.svg
    monacoLanguageId: go
    monacoFile: /workspace/main.go
    extensions: [ .go ]
    ephemeralFileName: main.go
    playgroundInitialCode: |
      package main 
           
      func main() { 
           
      }
    testerConfig:
#      TODO: implement
      imageName: sc-py-test
      testPath: /test_solution.py
      solutionPath: /solution.py
      reportPath: /usr/app/report.xml
      verdictClassName: org.supremecode.commonplugins.PyTestLanguageTester
