languages:
  cpp:
    name: C++
    iconPath: /plugins/cpp.svg
    monacoLanguageId: cpp
    ephemeralFileName: main.cpp
    monacoFile: /workspace/main.cpp
    extensions: [.cpp]
    playgroundInitialCode: |
      #include <iostream>

      int main() {
        std::cout << "Hello, SupremeCode, from C++";
      }
  java:
    name: Java
    iconPath: /plugins/java.svg
    monacoLanguageId: java
    extensions: [.java]
    ephemeralFileName: Main.java
    monacoFile: /workspace/Main.java
    playgroundInitialCode: |
      class App {
        public static void main(String... args) throws Exception {
          for(int i = 0; i < 100; ++i) {
              System.out.println("Hello, SupremeCode, from Java " + i);
              if(i % 5 == 0) {
                Thread.sleep(1000);
              }
          }
        }
      }
  javascript:
    name: JavaScript
    iconPath: /plugins/javascript.svg
    monacoLanguageId: javascript
    extensions: [.js,.jsx]
    monacoFile: /workspace/index.js
    ephemeralFileName: index.js
    playgroundInitialCode: 'console.log("Hello, SupremeCode, from JavaScript")'
  typescript:
    name: TypeScript
    iconPath: /plugins/typescript.svg
    monacoLanguageId: typescript
    monacoFile: /workspace/index.ts
    extensions: [.js,.jsx,.ts,.tsx]
    ephemeralFileName: index.ts
    playgroundInitialCode: 'console.log("Hello, SupremeCode, from TypeScript")'
  golang:
    name: Golang
    iconPath: /plugins/typescript.svg
    monacoLanguageId: go
    monacoFile: /workspace/main.go
    extensions: [ .go ]
    ephemeralFileName: main.go
    playgroundInitialCode: |
      package main 
           
      func main() { 
           
      }