spring:
  aop:
    proxy-target-class: true
  main:
    web-application-type: reactive
  datasource:
    url: jdbc:postgresql://localhost/supreme_code
    username: supreme_user
    password: password
    driver-class-name: org.postgresql.Driver
  kafka:
    bootstrap-servers: localhost:9092
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
    consumer:
      group-id: web-group
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://localhost:8070/realms/supreme-code
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        default_schema: supreme_code
    database: postgresql
#    database-platform: org.hibernate.dialect.PostgreSQL14Dialect
  flyway:
    url: jdbc:postgresql://localhost/supreme_code
    user: supreme_user
    password: password
    default-schema: supreme_code

