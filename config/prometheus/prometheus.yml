global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: "web"
    metrics_path: "/actuator/prometheus"
    static_configs:
      - targets: ["host.docker.internal:8080"]
        labels:
          application: "web"

  - job_name: "test-runner"
    metrics_path: "/actuator/prometheus"
    static_configs:
      - targets: ["host.docker.internal:8091"]
        labels:
          application: "test-runner"
